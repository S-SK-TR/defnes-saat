name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - defnes-saat
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-main:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy PortalApi to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: PortalApi/wwwroot
          branch: gh-pages
          target-folder: PortalApi

  deploy-defnes-saat:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/defnes-saat'
    steps:
      - name: Checkout defnes-saat
        uses: actions/checkout@v4
        with:
          ref: defnes-saat

      - name: Deploy defnes-saat to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
          target-folder: 4Scalping
